name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run typecheck

  mirror-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: commands/ matches .claude/commands/
        run: diff -rq commands/ .claude/commands/
      - name: agents/ matches .claude/agents/
        run: diff -rq agents/ .claude/agents/
      - name: hooks/ matches .claude/hooks/ (excluding plugin-only hooks.json)
        run: diff -rq hooks/ .claude/hooks/ --exclude=hooks.json

  hook-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: hook executes without error (no signal case)
        run: |
          echo '{"tool_name":"Read","tool_input":{"file_path":"foo.ts"},"session_id":"ci-test"}' | bash hooks/reflect-trigger.sh
      - name: hook detects tier 1 signal (fires trigger, writes state)
        run: |
          # Fire three Tier 1 signals (git restore = +100 each) to cross the
          # default cum_x100 threshold of 240. After fire, cum resets to 0 and
          # cooldown_remaining is set to 5.
          #
          # NOTE: `env VAR=x bash ...` (with pipe input) is correct. A prefix
          # like `VAR=x echo ... | bash ...` would apply VAR to echo, not bash.
          for i in 1 2 3; do
            echo '{"tool_name":"Bash","tool_input":{"command":"git restore foo.ts"},"session_id":"ci-test"}' | \
              env REFLECT_DEBUG=1 CLAUDE_PROJECT_DIR=/tmp/ci-test bash hooks/reflect-trigger.sh
          done
          echo "--- final state.json ---"
          cat /tmp/ci-test/.reflect/state.json
          grep -q '"cooldown_remaining":5' /tmp/ci-test/.reflect/state.json || {
            echo "FAIL: trigger did not fire (expected cooldown_remaining=5)"
            exit 1
          }

      - name: utterance hook detects tier 3 signal (no fire at single signal)
        run: |
          rm -rf /tmp/ci-utter-test
          echo '{"prompt":"no wait, undo that","session_id":"ci-utter-test"}' | \
            env REFLECT_DEBUG=1 CLAUDE_PROJECT_DIR=/tmp/ci-utter-test bash hooks/reflect-utterance.sh
          echo "--- utterance state.json ---"
          cat /tmp/ci-utter-test/.reflect/state.json
          grep -q '"cum_x100":50' /tmp/ci-utter-test/.reflect/state.json || {
            echo "FAIL: Tier 3 utterance not counted (expected cum_x100=50)"
            exit 1
          }
