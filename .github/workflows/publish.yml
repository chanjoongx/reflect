name: Publish to npm (OIDC + SLSA provenance)

# Triggered by pushing a `v*` tag (e.g., `git tag v0.1.3 && git push origin v0.1.3`).
# `workflow_dispatch` allows manual run from the Actions UI for debugging.
#
# Prerequisites (one-time):
#   1. npmjs.com -> Account -> @chanjoongx/reflect package -> Settings ->
#      Trusted Publisher -> Add: GitHub Actions, owner=chanjoongx,
#      repository=reflect, workflow filename=publish.yml.
#   2. (Optional) GitHub repo -> Settings -> Environments -> "npm-publish"
#      with required reviewers for a manual approval gate before publish.
#
# After setup, every `v*` tag triggers a publish with SLSA v1 provenance
# automatically generated by Sigstore via the `--provenance` flag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # required for OIDC -> npm provenance
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies (deterministic)
        run: npm ci

      - name: Verify 5-surface version sync
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          PLUGIN_VER=$(node -p "require('./.claude-plugin/plugin.json').version")
          LOCK_VER=$(node -p "require('./package-lock.json').version")
          BIN_VER=$(grep -oP 'console\.log\("\K[0-9]+\.[0-9]+\.[0-9]+(?="\);)' bin/reflect.ts | head -1)
          BUG_VER=$(grep -oP 'placeholder: "\K[0-9]+\.[0-9]+\.[0-9]+(?=")' .github/ISSUE_TEMPLATE/bug.yml | head -1)
          echo "package.json:      $PKG_VER"
          echo "package-lock.json: $LOCK_VER"
          echo "plugin.json:       $PLUGIN_VER"
          echo "bin/reflect.ts:    $BIN_VER"
          echo "bug.yml:           $BUG_VER"
          for V in "$LOCK_VER" "$PLUGIN_VER" "$BIN_VER" "$BUG_VER"; do
            if [ "$V" != "$PKG_VER" ]; then
              echo "FAIL: version mismatch — expected $PKG_VER, got $V"
              exit 1
            fi
          done

      - name: Verify tag matches package version (tag-triggered runs only)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "FAIL: tag v$TAG_VER does not match package.json version $PKG_VER"
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Mirror-check (commands/agents/hooks must match .claude/ mirror)
        run: npm run mirror-check

      - name: Build dist/
        run: npm run build

      - name: Publish to npm with provenance
        # --provenance uses GitHub OIDC token to generate SLSA v1 attestation,
        # signed by Sigstore's public-good infrastructure. The result appears
        # on npmjs.com under "Provenance" alongside the published version.
        run: npm publish --provenance --access public
